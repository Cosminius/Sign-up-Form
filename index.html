<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="left">
            <img src="image.avif" alt="Photo couldn't load" />
            <div class="logo-overlay">
                <img src="odin-lined.png" alt="logo" />
                <p>ODIN</p>
            </div>
        </div>
        <div class="right">
            <div class="header">
                <h1>
                    This is not a real online service! You know you need
                    somethign like thsi in your life to help you relaize your
                    depest dreams Sign up now to get started
                </h1>
                <h1>You know you want to</h1>
            </div>
            <h1>Let's do this!</h1>
            <div class="forms">
                <form action="#" method="post" class="form">
                    <div class="l-forms">
                        <label for="first_name">First Name:</label>
                        <input type="text" id="first_name" />
                        <label for="email">Email:</label>
                        <input type="email" />
                        <label for="password ">Password:</label>
                        <input type="password" required />
                    </div>
                    <div class="r-forms">
                        <label for="last_name">LAST NAME</label>
                        <input type="text" />
                        <label for="PHONENUMBER">PHONE NUMBER</label>
                        <input type="number" />
                        <label for="CONFIRM PASSWORD">CONFIRM PASSWORD</label>
                        <input type="password" required />
                    </div>
                </form>
            </div>
            <button type="submit" class="btn">Create Account</button>
            <p>
                Already have an account?
                <a href="#">Log in</a>
            </p>
        </div>
    </body>
</html>
